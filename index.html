<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Khiri Aissam</title>
  <meta name="description" content="KhiriAissam.com — Reserved personal domain.">
  <meta property="og:title" content="Khiri Aissam">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://khiriaissam.com">
  <meta name="robots" content="index, follow">
  <!-- FAVICON placeholder
       <link rel="icon" type="image/png" href="./favicon.png">
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  <link rel="canonical" href="https://khiriaissam.com">
</head>

<body>

  <!-- Animated background -->
  <div class="bg-scene" aria-hidden="true">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
    <div class="orb orb--3"></div>
    <div class="bg-grid"></div>
    <canvas id="particles" class="particles-canvas"></canvas>
  </div>

  <main class="page-wrap">

    <!-- Name -->
    <div class="name-block fade-in">
      <h1 class="name-title">Khiri <span class="name-accent">Aissam</span></h1>
      <p class="name-sub">KhiriAissam.com</p>
    </div>

    <!-- Form
         To enable real submissions, replace action="#" with your service URL:
         Formspree: action="https://formspree.io/f/YOUR_ID" method="POST"
         Getform:   action="https://getform.io/f/YOUR_ID"   method="POST"
    -->
    <div class="form-block fade-in" style="animation-delay:0.12s">
      <form class="contact-form glass-card" action="#" novalidate>
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="4" placeholder="Your message..." required></textarea>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Send Message</button>
      </form>
    </div>

  </main>

  <footer class="footer">
    <p>&copy; 2026 KhiriAissam.com</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
